databases:
  - name: quizz-db
    plan: free
    databaseName: quizdb
    user: quizuser

services:
  - type: redis
    name: quizz-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: quizz-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quizz-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: quizz-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 8080
      - key: CORS_ORIGINS
        value: https://quizz-live-play.netlify.app
    healthCheckPath: /swagger/index.html
